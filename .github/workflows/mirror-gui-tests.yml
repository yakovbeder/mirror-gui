name: Mirror-GUI Tests

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Run unit and integration tests
        run: npm run test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Run audit-catalog tests
        run: npx vitest run tests/scripts/auditFetchCatalogs.test.ts

      - name: Validate committed catalog metadata
        run: npx vitest run tests/scripts/catalogDataIntegrity.test.ts

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on scripts
        run: |
          for script in start-app.sh clean-stale-ports.sh entrypoint.sh container-run.sh fetch-catalogs-host.sh; do
            if [ -f "$script" ]; then
              echo "Checking $script"
              shellcheck -S error "$script"
            else
              echo "Skipping $script (not present, gitignored)"
            fi
          done

  container-image:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Podman
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Build container image
        run: podman build -t mirror-gui:ci .
