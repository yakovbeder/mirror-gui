name: Tests

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Install test catalog fixture
        run: cp -rT tests/fixtures/catalog-data catalog-data

      - name: Run unit and integration tests
        run: npm run test

      - name: Run tests with coverage
        run: npm run test:coverage

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Install test catalog fixture
        run: cp -rT tests/fixtures/catalog-data catalog-data

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on scripts
        run: |
          for script in start-app.sh clean-stale-ports.sh entrypoint.sh container-run.sh cron-build.sh fetch-catalogs-host.sh build-for-quay/build-for-quay.sh; do
            if [ -f "$script" ]; then
              echo "Checking $script"
              shellcheck -S error "$script"
            else
              echo "Skipping $script (not present, gitignored)"
            fi
          done
